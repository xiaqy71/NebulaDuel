name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            protobuf-compiler \
            libprotobuf-dev \
            libabsl-dev \
            libspdlog-dev \
            libgtest-dev \
            python3

      - name: Regenerate protobuf sources
        run: ./server/scripts/gen_proto.sh

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure

      - name: Check Python test script
        run: python3 -m py_compile server/scripts/test_packet_client.py
